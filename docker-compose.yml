services:
    app:
        image: ${DOCKER_IMAGE:-nest-app}:${DOCKER_TAG:-latest}
        container_name: ${SERVER_NAME}-${DOCKER_IMAGE}-${DOCKER_TAG}
        restart: unless-stopped
        env_file:
            - ./.env
        ports:
            - '${PORT:-3000}:3000'
        environment:
            - NODE_ENV=production
            - PORT=3000
            - DATABASE_URL=${DATABASE_URL}
            - REDIS_HOST=${REDIS_HOST}
            - REDIS_PORT=${REDIS_PORT}
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - REDIS_DB=${REDIS_DB:-0}
            - JWT_SECRET=${JWT_SECRET}
            - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-86400}
        networks:
            - ${NETWORK_NAME:-haui-network}

networks:
    haui-network:
        name: ${NETWORK_NAME:-haui-network}
        external: true
