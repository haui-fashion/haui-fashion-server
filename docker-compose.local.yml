services:
    nest-app:
        container_name: ${SERVER_NAME}-${DOCKER_IMAGE}-${DOCKER_TAG}
        build:
            context: .
            dockerfile: Dockerfile.local
        restart: unless-stopped
        command: sh -c "npx prisma migrate deploy && pnpm run start:debug"
        ports:
            - ${APP_CONTAINER_PORT}:${APP_CONTAINER_PORT}
            - ${DEBUG_PORT}:9229
        env_file:
            - ./.env
        volumes:
            - ./src:/src
            - ./prisma:/prisma
            - ./package.json:/package.json
            - ./pnpm-lock.yaml:/pnpm-lock.yaml
            - ./tsconfig.json:/tsconfig.json
            - ./nest-cli.json:/nest-cli.json
        networks:
            - haui-network

networks:
    haui-network:
        name: ${NETWORK_NAME:-haui-network}
        external: true
